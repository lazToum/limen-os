# LIMEN OS — rsync daemon config
#
# cspell: disable
# Run with:
#   rsync --daemon --config=/path/to/rsyncd.conf --no-detach
# Or via the systemd unit: limen-rsyncd.service
#
# Then push from another machine:
#   rsync -avz --delete src/ rsync://limen-host:8730/source/
#   rsync -avz --delete src/ rsync://limen-host:8730/preview/

# Daemon settings
port            = 8730
log file        = /tmp/limen-rsyncd.log
pid file        = /tmp/limen-rsyncd.pid
max connections = 4
timeout         = 300
use chroot      = no

# ── Module: full source tree (push/pull dev work) ─────────────────────────────
[source]
    path            = /opt/limen
    comment         = LIMEN OS source tree
    read only       = no
    write only      = no
    list            = yes
    uid             = root
    gid             = root
    # No auth for LAN dev; add secrets file for production.
    # auth users    = limen
    # secrets file  = /etc/rsyncd.secrets
    exclude         = target/
    exclude         = node_modules/
    exclude         = .dart_tool/
    exclude         = apps/mobile/build/
    exclude         = apps/mobile/android/
    exclude         = apps/mobile/ios/
    exclude         = .git/
    exclude         = .env
    exclude         = .env.local
    exclude         = *.key
    exclude         = *.pem

# ── Module: preview dist only (lightweight, for browser preview) ──────────────
[preview]
    path            = /opt/limen/apps/shell/dist
    comment         = LIMEN OS built frontend (preview)
    read only       = yes
    list            = yes
    uid             = root
    gid             = root
