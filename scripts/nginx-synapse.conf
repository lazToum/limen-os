# LIMEN OS — io.waldiez.io
# Auth: cookie-based sessions via serve.ts /limen/auth/check (auth_request).
# Login page: /login (public, served from dist/login.html).
# HA: proxied through serve.ts (port 1420) so it handles all asset paths + Location rewrites.

server {
    listen 80;
    server_name io.waldiez.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name io.waldiez.io;

    ssl_certificate     /etc/letsencrypt/live/io.waldiez.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/io.waldiez.io/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /opt/limen/apps/shell/dist;
    index index.html;

    sub_filter_once on;
    sub_filter '<head>' '<head><script>(function(){if(!navigator.serviceWorker)return;if(sessionStorage.getItem("sw_cleaned"))return;navigator.serviceWorker.getRegistrations().then(function(regs){var origin=location.origin;var dirty=regs.filter(function(r){return r.scope===origin+"/"||r.scope===origin;});if(!dirty.length)return;Promise.all(dirty.map(function(r){return r.unregister();})).then(function(){sessionStorage.setItem("sw_cleaned","1");location.reload();});});})();</script><script>window.__LIMEN_RELAY__=true;window.__LIMEN_SERVICES__={"ha":"/ha/","code":"/code/","jupyter":"/jupyter/","portainer":"/portainer/","grafana":"/grafana/","nodered":"/nodered/"};</script>';

    # ── Auth gate ──────────────────────────────────────────────────────────────
    # Internal subrequest — never reachable directly
    location = /limen/auth/check {
        internal;
        proxy_pass              http://127.0.0.1:1420/limen/auth/check;
        proxy_pass_request_body off;
        proxy_set_header        Content-Length "";
        proxy_set_header        X-Original-URI $request_uri;
        proxy_set_header        Cookie $http_cookie;
    }

    # Limen login / logout — public (no auth_request)
    location ~ ^/limen/auth/(login|logout)$ {
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Login page — public
    location = /login {
        try_files /login.html =404;
    }

    # HA connectivity diagnostic — public (no auth needed for debugging)
    location = /health/ha {
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # Redirect unauthenticated requests to the login page
    location @unauth {
        return 302 /login?next=$request_uri;
    }

    # ── Static assets — long-lived cache, auth protected ──────────────────────
    location /assets/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── serve.ts relay (proxy, ai, frame-proxy, health, mqtt-ws) ──────────────
    location ~ ^/(proxy|ai|search|health|ipc|events|yt-search|frame-proxy|mqtt-ws|mqtt) {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    location /vnc/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:6080/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    location /companion {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    location /shell-relay {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
    }

    # ── Embedded services ──────────────────────────────────────────────────────

    # Node-RED
    location /nodered/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1880/nodered/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # JupyterLab
    location /jupyter/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:8888/jupyter/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    # Grafana
    location /grafana/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Portainer
    location /portainer/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # code-server
    location /code/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:8080/code/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Sinergym
    location /sinergym/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:8090/sinergym/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Limen TUI — ttyd WebSocket terminal serving the Ratatui TUI binary
    location /tui/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:7681;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    # SmartCities — root-level static assets (app wrongly references /building.png etc.)
    location ~* ^/(building\.png|smartcities-[^/]+\.(js|css|png|svg|ico))$ {
        proxy_pass         http://127.0.0.1:8091/$1;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # SmartCities
    location /smartcities/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:8091/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # Waldiez Player — SPA proxied through serve.ts
    location /player/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Don't inject shell scripts into the player SPA
        sub_filter '<head>' '<head>';
        sub_filter_once  on;
    }

    # Waldiez Studio — proxied through serve.ts (path-strip + config.js inject)
    location /studio/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    # AgentFlow — monitor (8889) and REST API (8890) via serve.ts
    location /af/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    # Home Assistant — proxied through serve.ts which handles:
    #   /ha/         → HA with Location rewriting + localStorage fix
    #   /frontend_latest/ /static/ /hacsfiles/ → HA static assets
    #   /api/        → HA REST + WebSocket
    #   /auth/authorize /auth/token /auth/callback → HA auth flow
    # (serve.ts /auth/login and /auth/logout are handled before the HA /auth/ catch-all)
    location /ha/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    # HA root-level asset paths (absolute URLs from HA-served HTML → proxied to serve.ts)
    location ~ ^/(frontend_latest|static|local|hacsfiles)/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # HA API + WebSocket (also used by HA frontend JS with absolute paths)
    location /api/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 86400s;
    }

    # HA auth flow (authorize, token, callback) — unambiguously HA now that Limen uses /limen/auth/*
    location /auth/ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # HA manifest + service workers — serve.ts sets correct Service-Worker-Allowed header
    location ~ ^/(manifest\.json|sw-modern\.js|sw-registrar\.js)$ {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        proxy_pass         http://127.0.0.1:1420;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        auth_request /limen/auth/check;
        error_page 401 = @unauth;
        try_files $uri $uri/ /index.html =503;
    }
}
