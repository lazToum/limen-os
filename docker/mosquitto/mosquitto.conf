# Mosquitto config for LIMEN OS / HAOS stack
# Mounted into the mosquitto container by haos-stack.yml

# TCP MQTT (port 1883)
listener 1883
protocol mqtt

# WebSocket MQTT (port 9001) — used by AgentFlow and browser voice clients
listener 9001
protocol websockets

# Allow anonymous connections.
# For production, set to false and use:
#   mosquitto_passwd -c /mosquitto/config/passwd <username>
#   password_file /mosquitto/config/passwd
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
