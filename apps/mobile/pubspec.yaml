name: limen_mobile
description: LIMEN OS Mobile Companion — voice relay, remote control, second screen.
version: 0.1.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  dynamic_color: ^1.8.1

  # WebRTC bridge
  flutter_webrtc: ^1.3.1

  # HTTP + WebSocket (connect to limen-core daemon)
  web_socket_channel: ^3.0.3
  http: ^1.6.0

  # State management
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1

  # Audio (voice relay)
  record: ^6.2.0
  audioplayers: ^6.6.0

  # Camera (gesture + face relay)
  camera: ^0.12.0

  # Permissions
  permission_handler: ^12.0.1

  # Storage
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
