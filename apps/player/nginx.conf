server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/yaml
        application/waldiez
        image/svg+xml;
    gzip_min_length 1024;

    # latest-auto.wid — always fetch fresh from the origin (never cache)
    location ~* /latest-auto\.wid$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Hashed static assets (JS/CSS/fonts with content-hash in filename)
    location ~* \.[0-9a-f]{8,}\.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # YouTube search backend proxy for hosted deployments.
    # This avoids browser CORS failures by querying Invidious server-side.
    location = /api/youtube/search {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
        proxy_ssl_server_name on;
        proxy_set_header Host inv.nadeko.net;
        proxy_pass https://inv.nadeko.net/api/v1/search$is_args$args;
        add_header Cache-Control "no-store";
    }

    # SPA fallback — all unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
