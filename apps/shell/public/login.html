<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIMEN OS — Sign In</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-deep: #04080f;
      --bg-mid: #080f1e;
      --bg-card: rgba(10, 16, 35, 0.72);
      --border-glass: rgba(99, 120, 220, 0.18);
      --indigo-400: #818cf8;
      --indigo-500: #6366f1;
      --indigo-600: #4f46e5;
      --purple-500: #a855f7;
      --text-primary: #e2e8f0;
      --text-muted: #94a3b8;
      --text-faint: #475569;
      --input-bg: rgba(6, 12, 28, 0.70);
      --input-border: rgba(99, 120, 220, 0.22);
      --input-focus: rgba(99, 120, 220, 0.55);
      --error-color: #f87171;
      --error-bg: rgba(248, 113, 113, 0.10);
      --error-border: rgba(248, 113, 113, 0.30);
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
    }

    /* ── Background aurora ─────────────────────────────── */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79, 70, 229, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(168, 85, 247, 0.14) 0%, transparent 55%),
        radial-gradient(ellipse 70% 40% at 50% 50%, rgba(6, 18, 50, 0.90) 0%, transparent 70%),
        linear-gradient(160deg, #04080f 0%, #080f1e 40%, #0d1a38 70%, #060c1c 100%);
      animation: auroraShift 18s ease-in-out infinite alternate;
    }

    @keyframes auroraShift {
      0%   { filter: hue-rotate(0deg) brightness(1); }
      33%  { filter: hue-rotate(12deg) brightness(1.06); }
      66%  { filter: hue-rotate(-8deg) brightness(0.97); }
      100% { filter: hue-rotate(6deg) brightness(1.04); }
    }

    /* ── Floating particles ────────────────────────────── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(129, 140, 248, 0.7) 0%, transparent 70%);
      animation: floatUp linear infinite;
      opacity: 0;
    }

    .particle:nth-child(1)  { width: 3px;  height: 3px;  left: 8%;   animation-duration: 22s; animation-delay: 0s;    }
    .particle:nth-child(2)  { width: 2px;  height: 2px;  left: 17%;  animation-duration: 28s; animation-delay: 3s;    }
    .particle:nth-child(3)  { width: 4px;  height: 4px;  left: 26%;  animation-duration: 19s; animation-delay: 6s;    }
    .particle:nth-child(4)  { width: 2px;  height: 2px;  left: 35%;  animation-duration: 25s; animation-delay: 1.5s;  }
    .particle:nth-child(5)  { width: 3px;  height: 3px;  left: 44%;  animation-duration: 31s; animation-delay: 9s;    }
    .particle:nth-child(6)  { width: 2px;  height: 2px;  left: 55%;  animation-duration: 20s; animation-delay: 4s;    }
    .particle:nth-child(7)  { width: 4px;  height: 4px;  left: 63%;  animation-duration: 27s; animation-delay: 7s;    }
    .particle:nth-child(8)  { width: 2px;  height: 2px;  left: 72%;  animation-duration: 23s; animation-delay: 2s;    }
    .particle:nth-child(9)  { width: 3px;  height: 3px;  left: 81%;  animation-duration: 34s; animation-delay: 11s;   }
    .particle:nth-child(10) { width: 2px;  height: 2px;  left: 90%;  animation-duration: 21s; animation-delay: 5s;    }
    .particle:nth-child(11) { width: 3px;  height: 3px;  left: 12%;  animation-duration: 29s; animation-delay: 14s;   }
    .particle:nth-child(12) { width: 2px;  height: 2px;  left: 48%;  animation-duration: 24s; animation-delay: 8s;    }
    .particle:nth-child(13) { width: 4px;  height: 4px;  left: 68%;  animation-duration: 18s; animation-delay: 16s;   }
    .particle:nth-child(14) { width: 2px;  height: 2px;  left: 31%;  animation-duration: 26s; animation-delay: 12s;   }
    .particle:nth-child(15) { width: 3px;  height: 3px;  left: 87%;  animation-duration: 32s; animation-delay: 19s;   }

    /* purple-tinted particles */
    .particle:nth-child(3n+1) {
      background: radial-gradient(circle, rgba(168, 85, 247, 0.65) 0%, transparent 70%);
    }
    .particle:nth-child(5n+2) {
      background: radial-gradient(circle, rgba(99, 102, 241, 0.75) 0%, transparent 70%);
    }

    @keyframes floatUp {
      0%   { bottom: -10px; opacity: 0;    transform: translateX(0) scale(1); }
      10%  { opacity: 0.8; }
      80%  { opacity: 0.5; }
      100% { bottom: 110%;  opacity: 0;    transform: translateX(30px) scale(1.4); }
    }

    /* ── Nebula accent orbs ────────────────────────────── */
    .orb {
      position: fixed;
      z-index: 1;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: orbDrift ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 520px; height: 520px;
      top: -160px; left: -140px;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.22) 0%, transparent 65%);
      animation-duration: 14s;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 420px; height: 420px;
      bottom: -120px; right: -100px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.18) 0%, transparent 65%);
      animation-duration: 17s;
      animation-delay: -5s;
    }

    .orb-3 {
      width: 280px; height: 280px;
      top: 40%; right: 8%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.10) 0%, transparent 65%);
      animation-duration: 11s;
      animation-delay: -9s;
    }

    @keyframes orbDrift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(20px, 30px) scale(1.08); }
    }

    /* ── Page layout ───────────────────────────────────── */
    .page {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: 24px;
    }

    /* ── Card ──────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      padding: 44px 40px 36px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.04) inset,
        0 32px 80px rgba(0, 0, 0, 0.55),
        0 0 60px rgba(79, 70, 229, 0.08);
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card.shake {
      animation: shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15%       { transform: translateX(-8px); }
      30%       { transform: translateX(7px); }
      45%       { transform: translateX(-6px); }
      60%       { transform: translateX(5px); }
      75%       { transform: translateX(-4px); }
      90%       { transform: translateX(3px); }
    }

    /* ── Logo + header ─────────────────────────────────── */
    .card-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
    }

    .logo-ring {
      position: relative;
      width: 68px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-ring::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        from 180deg,
        rgba(99, 102, 241, 0.9) 0deg,
        rgba(168, 85, 247, 0.7) 120deg,
        rgba(56, 189, 248, 0.5) 200deg,
        rgba(99, 102, 241, 0.0) 280deg,
        rgba(99, 102, 241, 0.9) 360deg
      );
      animation: ringRotate 4s linear infinite;
    }

    .logo-ring::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(
        from 180deg,
        rgba(99, 102, 241, 0.9) 0deg,
        rgba(168, 85, 247, 0.7) 120deg,
        rgba(56, 189, 248, 0.5) 200deg,
        rgba(99, 102, 241, 0.0) 280deg,
        rgba(99, 102, 241, 0.9) 360deg
      );
      animation: ringRotate 4s linear infinite;
      filter: blur(6px);
      opacity: 0.5;
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .logo-bg {
      position: relative;
      z-index: 1;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #08102a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-bg img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: brightness(1.3) drop-shadow(0 0 8px rgba(129, 140, 248, 0.6));
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #c7d2fe 0%, #a5b4fc 40%, #d8b4fe 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.2;
    }

    .card-subtitle {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-top: -8px;
    }

    /* ── Form fields ───────────────────────────────────── */
    .form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrap input {
      width: 100%;
      padding: 12px 44px 12px 16px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14.5px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-appearance: none;
    }

    .input-wrap input::placeholder {
      color: var(--text-faint);
    }

    .input-wrap input:focus {
      border-color: var(--input-focus);
      background: rgba(6, 12, 28, 0.85);
      box-shadow: 0 0 0 3px rgba(99, 120, 220, 0.15), 0 0 20px rgba(99, 102, 241, 0.08);
    }

    .input-wrap input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #080f20 inset !important;
      -webkit-text-fill-color: var(--text-primary) !important;
      border-color: var(--input-focus) !important;
    }

    .toggle-btn {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-faint);
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.2s;
      line-height: 0;
    }

    .toggle-btn:hover { color: var(--indigo-400); }

    .toggle-btn svg { width: 17px; height: 17px; }

    /* ── Error banner ──────────────────────────────────── */
    .error-banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 10px;
      color: var(--error-color);
      font-size: 13px;
      font-weight: 500;
      animation: fadeSlideIn 0.25s ease both;
    }

    .error-banner.visible {
      display: flex;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error-banner svg { flex-shrink: 0; width: 16px; height: 16px; }

    /* ── Submit button ─────────────────────────────────── */
    .submit-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 24px;
      margin-top: 8px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 50%, #7c3aed 100%);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.30), 0 1px 4px rgba(0,0,0,0.4);
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .submit-btn:hover:not(:disabled)::before { opacity: 1; }
    .submit-btn:hover:not(:disabled) {
      box-shadow: 0 6px 28px rgba(99, 102, 241, 0.45), 0 1px 4px rgba(0,0,0,0.4);
      transform: translateY(-1px);
    }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }

    .btn-label { position: relative; z-index: 1; }

    /* ── Spinner ───────────────────────────────────────── */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      position: relative;
      z-index: 1;
    }

    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-label { opacity: 0.75; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Footer caption ────────────────────────────────── */
    .caption {
      text-align: center;
      margin-top: 28px;
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-faint);
      animation: cardIn 0.6s 0.15s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .caption span {
      display: inline-block;
      padding: 5px 14px;
      border: 1px solid rgba(99, 120, 220, 0.12);
      border-radius: 999px;
      background: rgba(10, 16, 35, 0.45);
      backdrop-filter: blur(8px);
    }

    /* ── Responsive ────────────────────────────────────── */
    @media (max-width: 480px) {
      .card { padding: 36px 24px 28px; }
      .card-title { font-size: 19px; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="aurora"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="particles" aria-hidden="true">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <!-- Page -->
  <main class="page">
    <div class="card" id="card" role="main">

      <!-- Header -->
      <div class="card-header">
        <div class="logo-ring" aria-hidden="true">
          <div class="logo-bg">
            <img src="/icons/waldiez.svg" alt="Waldiez logo" width="36" height="36">
          </div>
        </div>
        <div>
          <h1 class="card-title">Limen OS</h1>
          <p class="card-subtitle">Sign in to continue</p>
        </div>
      </div>

      <!-- Form -->
      <form class="form" id="loginForm" novalidate autocomplete="on">

        <!-- Error banner -->
        <div class="error-banner" id="errorBanner" role="alert" aria-live="assertive">
          <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-1-9h2V6H9v3zm0 4h2v-2H9v2z" clip-rule="evenodd"/>
          </svg>
          <span id="errorText">Invalid credentials</span>
        </div>

        <!-- Username -->
        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <input
              type="text"
              id="username"
              name="username"
              placeholder="Enter username"
              autocomplete="username"
              spellcheck="false"
              autocapitalize="off"
              required
            >
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter password"
              autocomplete="current-password"
              required
            >
            <button
              type="button"
              class="toggle-btn"
              id="togglePass"
              aria-label="Toggle password visibility"
              tabindex="0"
            >
              <!-- Eye icon (password hidden) -->
              <svg id="iconEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <!-- Eye-off icon (password shown) -->
              <svg id="iconEyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="submit-btn" id="submitBtn">
          <span class="spinner" id="spinner" aria-hidden="true"></span>
          <span class="btn-label">Sign In</span>
        </button>

      </form>
    </div>

    <p class="caption"><span>LIMEN OS v1.0</span></p>
  </main>

  <script>
    (function () {
      'use strict';

      const form       = document.getElementById('loginForm');
      const card       = document.getElementById('card');
      const submitBtn  = document.getElementById('submitBtn');
      const errorBanner = document.getElementById('errorBanner');
      const errorText  = document.getElementById('errorText');
      const passInput  = document.getElementById('password');
      const toggleBtn  = document.getElementById('togglePass');
      const iconEye    = document.getElementById('iconEye');
      const iconEyeOff = document.getElementById('iconEyeOff');

      // ── Password visibility toggle ────────────────────
      toggleBtn.addEventListener('click', function () {
        const isHidden = passInput.type === 'password';
        passInput.type  = isHidden ? 'text' : 'password';
        iconEye.style.display    = isHidden ? 'none'  : '';
        iconEyeOff.style.display = isHidden ? ''      : 'none';
        toggleBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
      });

      // ── Helpers ───────────────────────────────────────
      function setLoading(on) {
        submitBtn.disabled = on;
        submitBtn.classList.toggle('loading', on);
      }

      function showError(msg) {
        errorText.textContent = msg || 'Invalid credentials';
        errorBanner.classList.add('visible');
        errorBanner.style.animation = 'none';
        // Trigger reflow to restart animation
        void errorBanner.offsetWidth;
        errorBanner.style.animation = '';
      }

      function hideError() {
        errorBanner.classList.remove('visible');
      }

      function triggerShake() {
        card.classList.remove('shake');
        void card.offsetWidth; // reflow
        card.classList.add('shake');
        card.addEventListener('animationend', () => card.classList.remove('shake'), { once: true });
      }

      function getNextUrl() {
        try {
          const params = new URLSearchParams(window.location.search);
          const next = params.get('next') || '/limen/';
          // Basic safety: only allow relative paths
          if (next.startsWith('/') && !next.startsWith('//')) return next;
        } catch (_) { /* ignore */ }
        return '/limen/';
      }

      // ── Form submit ───────────────────────────────────
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        hideError();

        const user = document.getElementById('username').value.trim();
        const pass = passInput.value;

        if (!user || !pass) {
          showError('Please enter both username and password.');
          triggerShake();
          return;
        }

        setLoading(true);

        try {
          const response = await fetch('/limen/auth/login', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            credentials: 'same-origin',
            body: JSON.stringify({ user, pass }),
          });

          if (response.ok) {
            // Success — redirect
            window.location.href = getNextUrl();
            return;
          }

          if (response.status === 401) {
            triggerShake();
            showError('Invalid credentials');
            passInput.value = '';
            passInput.focus();
          } else if (response.status === 429) {
            triggerShake();
            showError('Too many attempts. Please wait and try again.');
          } else {
            triggerShake();
            showError('An error occurred. Please try again.');
          }
        } catch (err) {
          triggerShake();
          showError('Network error — check your connection.');
        } finally {
          setLoading(false);
        }
      });

      // ── Clear error on input ──────────────────────────
      ['username', 'password'].forEach(function (id) {
        document.getElementById(id).addEventListener('input', hideError);
      });

      // ── Auto-focus ────────────────────────────────────
      document.getElementById('username').focus();
    })();
  </script>
</body>
</html>
