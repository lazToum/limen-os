<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="vsc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0065A9"/>
      <stop offset="100%" style="stop-color:#007ACC"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#vsc-bg)"/>
  <!-- VS Code chevron logo -->
  <g fill="none" stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <!-- left chevron -->
    <polyline points="38,28 18,50 38,72"/>
    <!-- right chevron -->
    <polyline points="62,28 82,50 62,72"/>
    <!-- slash -->
    <line x1="56" y1="24" x2="44" y2="76"/>
  </g>
</svg>
