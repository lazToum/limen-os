<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="bldA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="bldB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="bldC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Sky background -->
  <rect width="48" height="48" rx="8" fill="url(#sky)"/>

  <!-- Ground line -->
  <rect x="0" y="38" width="48" height="10" rx="0" fill="#0f172a"/>
  <rect x="0" y="37" width="48" height="2" fill="#1e3a5f"/>

  <!-- Building C (left, medium) -->
  <rect x="3" y="22" width="9" height="16" fill="url(#bldC)"/>
  <!-- windows C -->
  <rect x="5" y="24" width="2" height="2" rx="0.3" fill="#a5b4fc" opacity="0.8"/>
  <rect x="8" y="24" width="2" height="2" rx="0.3" fill="#a5b4fc" opacity="0.5"/>
  <rect x="5" y="28" width="2" height="2" rx="0.3" fill="#a5b4fc" opacity="0.9"/>
  <rect x="8" y="28" width="2" height="2" rx="0.3" fill="#a5b4fc" opacity="0.3"/>
  <rect x="5" y="32" width="2" height="2" rx="0.3" fill="#a5b4fc" opacity="0.7"/>
  <rect x="8" y="32" width="2" height="2" rx="0.3" fill="#a5b4fc" opacity="0.8"/>

  <!-- Building A (center, tall) -->
  <rect x="14" y="10" width="12" height="28" fill="url(#bldA)"/>
  <!-- windows A -->
  <rect x="16" y="12" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.9"/>
  <rect x="20" y="12" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.6"/>
  <rect x="16" y="16" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.4"/>
  <rect x="20" y="16" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.9"/>
  <rect x="16" y="20" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.8"/>
  <rect x="20" y="20" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.5"/>
  <rect x="16" y="24" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.9"/>
  <rect x="20" y="24" width="2" height="2" rx="0.3" fill="#fbbf24" opacity="0.9"/>
  <rect x="16" y="28" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.6"/>
  <rect x="20" y="28" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.7"/>
  <rect x="16" y="32" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.3"/>
  <rect x="20" y="32" width="2" height="2" rx="0.3" fill="#93c5fd" opacity="0.9"/>

  <!-- Building B (right, medium-tall) -->
  <rect x="28" y="16" width="10" height="22" fill="url(#bldB)"/>
  <!-- windows B -->
  <rect x="30" y="18" width="2" height="2" rx="0.3" fill="#7dd3fc" opacity="0.8"/>
  <rect x="34" y="18" width="2" height="2" rx="0.3" fill="#7dd3fc" opacity="0.5"/>
  <rect x="30" y="22" width="2" height="2" rx="0.3" fill="#7dd3fc" opacity="0.9"/>
  <rect x="34" y="22" width="2" height="2" rx="0.3" fill="#fbbf24" opacity="0.8"/>
  <rect x="30" y="26" width="2" height="2" rx="0.3" fill="#7dd3fc" opacity="0.7"/>
  <rect x="34" y="26" width="2" height="2" rx="0.3" fill="#7dd3fc" opacity="0.4"/>
  <rect x="30" y="30" width="2" height="2" rx="0.3" fill="#7dd3fc" opacity="0.9"/>
  <rect x="34" y="30" width="2" height="2" rx="0.3" fill="#7dd3fc" opacity="0.6"/>

  <!-- Small building far right -->
  <rect x="40" y="28" width="6" height="10" fill="#1e3a5f"/>
  <rect x="42" y="30" width="1.5" height="1.5" rx="0.2" fill="#7dd3fc" opacity="0.7"/>
  <rect x="44" y="30" width="1.5" height="1.5" rx="0.2" fill="#7dd3fc" opacity="0.5"/>
  <rect x="42" y="33" width="1.5" height="1.5" rx="0.2" fill="#7dd3fc" opacity="0.8"/>

  <!-- Energy flow dots (animated) -->
  <circle cx="20" cy="7" r="1.5" fill="#34d399" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="24" cy="5" r="1" fill="#34d399" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="16" cy="6" r="1" fill="#34d399" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.1;0.7" dur="2s" begin="1s" repeatCount="indefinite"/>
  </circle>
</svg>
