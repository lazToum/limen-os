<svg
  class="ha-icon"
  viewBox="0 0 48 48"
  width="48"
  height="48"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-label="Home Assistant"
  role="img"
>
  <style>
    /*
     * Home Assistant icon — self-contained, embeddable SVG
     * Brand: HA blue house with hex-dot grid accent
     * No global selectors. Scoped to svg.ha-icon.
     */

    svg.ha-icon {
      overflow: visible;
      filter: drop-shadow(0 2px 8px rgba(24, 109, 214, 0.35));
      animation: ha-breathe 3.6s ease-in-out infinite;
    }

    svg.ha-icon .ha-house {
      animation: ha-pulse 3.6s ease-in-out infinite;
      transform-origin: 24px 26px;
    }

    svg.ha-icon .ha-dot-1 { animation: ha-dot 2.8s ease-in-out infinite 0.0s; }
    svg.ha-icon .ha-dot-2 { animation: ha-dot 2.8s ease-in-out infinite 0.3s; }
    svg.ha-icon .ha-dot-3 { animation: ha-dot 2.8s ease-in-out infinite 0.6s; }
    svg.ha-icon .ha-dot-4 { animation: ha-dot 2.8s ease-in-out infinite 0.9s; }
    svg.ha-icon .ha-dot-5 { animation: ha-dot 2.8s ease-in-out infinite 1.2s; }
    svg.ha-icon .ha-dot-6 { animation: ha-dot 2.8s ease-in-out infinite 1.5s; }

    @keyframes ha-breathe {
      0%,100% { filter: drop-shadow(0 2px 8px rgba(24,109,214,0.35)); }
      50%      { filter: drop-shadow(0 3px 14px rgba(24,109,214,0.60)); }
    }
    @keyframes ha-pulse {
      0%,100% { opacity: 1;    transform: scale(1); }
      50%      { opacity: 0.92; transform: scale(1.03); }
    }
    @keyframes ha-dot {
      0%,100% { opacity: 0.50; }
      50%      { opacity: 1.00; }
    }

    @media (prefers-reduced-motion: reduce) {
      svg.ha-icon,
      svg.ha-icon .ha-house,
      svg.ha-icon .ha-dot-1,
      svg.ha-icon .ha-dot-2,
      svg.ha-icon .ha-dot-3,
      svg.ha-icon .ha-dot-4,
      svg.ha-icon .ha-dot-5,
      svg.ha-icon .ha-dot-6 { animation: none; }
    }
  </style>

  <defs>
    <radialGradient id="ha-bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%"   stop-color="#0d2244"/>
      <stop offset="100%" stop-color="#060d1e"/>
    </radialGradient>
    <radialGradient id="ha-house-fill" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#41a0ff"/>
      <stop offset="100%" stop-color="#186dd6"/>
    </radialGradient>
    <filter id="ha-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background disc -->
  <rect width="48" height="48" rx="10.5" fill="url(#ha-bg)"/>

  <!-- House body + roof + chimney -->
  <g class="ha-house" filter="url(#ha-glow)">
    <!-- Roof (pentagon) -->
    <polygon
      points="24,7 42,22 38,22 38,41 10,41 10,22 6,22"
      fill="url(#ha-house-fill)"
      opacity="0.95"
    />
    <!-- Roof overlay (darker ridge) -->
    <polygon
      points="24,7 42,22 6,22"
      fill="#0f4fa8"
      opacity="0.55"
    />
    <!-- Chimney -->
    <rect x="30" y="9" width="4" height="9" rx="1" fill="#186dd6"/>
    <!-- Door -->
    <rect x="20" y="31" width="8" height="10" rx="1.5" fill="#0d2244" opacity="0.75"/>
    <!-- Door knob -->
    <circle cx="27.2" cy="36.5" r="0.9" fill="#41a0ff" opacity="0.9"/>
    <!-- Left window -->
    <rect x="12" y="26" width="6" height="5" rx="1" fill="#41a0ff" opacity="0.35"/>
    <!-- Right window -->
    <rect x="30" y="26" width="6" height="5" rx="1" fill="#41a0ff" opacity="0.35"/>
  </g>

  <!-- Hex-dot grid (decorative, top-right corner) -->
  <g opacity="0.7">
    <circle class="ha-dot-1" cx="38" cy="7"  r="1.6" fill="#41a0ff"/>
    <circle class="ha-dot-2" cx="43" cy="10" r="1.6" fill="#41a0ff"/>
    <circle class="ha-dot-3" cx="43" cy="5"  r="1.6" fill="#41a0ff"/>
    <circle class="ha-dot-4" cx="38" cy="13" r="1.6" fill="#41a0ff"/>
    <circle class="ha-dot-5" cx="43" cy="16" r="1.6" fill="#41a0ff"/>
    <circle class="ha-dot-6" cx="33" cy="10" r="1.6" fill="#41a0ff"/>
  </g>

  <!-- Rim -->
  <rect width="48" height="48" rx="10.5" stroke="#186dd6" stroke-width="0.5" fill="none" opacity="0.25"/>
</svg>
