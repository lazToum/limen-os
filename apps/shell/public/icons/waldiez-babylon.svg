<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="wb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A0A2E"/>
      <stop offset="100%" style="stop-color:#2D1060"/>
    </linearGradient>
    <linearGradient id="wb-edge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CB95FA;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#9B59FA;stop-opacity:0.8"/>
    </linearGradient>
    <filter id="wb-glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#wb-bg)"/>

  <!-- Edge lines between nodes -->
  <g stroke="url(#wb-edge)" stroke-width="1.5" opacity="0.7">
    <!-- center → top-left -->
    <line x1="50" y1="50" x2="22" y2="28"/>
    <!-- center → top-right -->
    <line x1="50" y1="50" x2="78" y2="28"/>
    <!-- center → bottom-left -->
    <line x1="50" y1="50" x2="22" y2="72"/>
    <!-- center → bottom-right -->
    <line x1="50" y1="50" x2="78" y2="72"/>
    <!-- center → top -->
    <line x1="50" y1="50" x2="50" y2="18"/>
    <!-- side ring: top-left → top -->
    <line x1="22" y1="28" x2="50" y2="18"/>
    <!-- side ring: top-right → top -->
    <line x1="78" y1="28" x2="50" y2="18"/>
    <!-- side ring: bottom pair -->
    <line x1="22" y1="72" x2="78" y2="72"/>
  </g>

  <!-- Satellite nodes -->
  <g filter="url(#wb-glow)">
    <!-- top -->
    <circle cx="50" cy="18" r="5.5" fill="#CB95FA" opacity="0.9"/>
    <!-- top-left -->
    <circle cx="22" cy="28" r="5" fill="#A87AE8" opacity="0.85"/>
    <!-- top-right -->
    <circle cx="78" cy="28" r="5" fill="#A87AE8" opacity="0.85"/>
    <!-- bottom-left -->
    <circle cx="22" cy="72" r="5" fill="#7B5EC2" opacity="0.8"/>
    <!-- bottom-right -->
    <circle cx="78" cy="72" r="5" fill="#7B5EC2" opacity="0.8"/>
  </g>

  <!-- Central hub — bright, larger -->
  <circle cx="50" cy="50" r="10" fill="#CB95FA" filter="url(#wb-glow)" opacity="0.95"/>
  <circle cx="50" cy="50" r="6" fill="#F0D0FF"/>

  <!-- "W" lettermark on hub -->
  <text x="50" y="54" text-anchor="middle"
    font-family="'Arial Black', Arial, sans-serif"
    font-weight="900" font-size="8" fill="#2D1060" letter-spacing="-0.5">W</text>
</svg>
