<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="jup-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="18" fill="url(#jup-bg)"/>
  <!-- Jupyter orbit rings -->
  <ellipse cx="50" cy="50" rx="34" ry="14" fill="none" stroke="#F37626" stroke-width="4" opacity="0.9"/>
  <ellipse cx="50" cy="50" rx="34" ry="14" fill="none" stroke="#9B59B6" stroke-width="3.5" opacity="0.7"
    transform="rotate(60 50 50)"/>
  <ellipse cx="50" cy="50" rx="34" ry="14" fill="none" stroke="#4FACDE" stroke-width="3" opacity="0.7"
    transform="rotate(120 50 50)"/>
  <!-- Nucleus -->
  <circle cx="50" cy="50" r="7" fill="#F37626"/>
</svg>
